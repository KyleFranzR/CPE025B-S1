<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Most Popular Pokemons</title>
    <link rel="stylesheet" href="styles.css">
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelector('header').classList.add('visible');
    });
    </script>
</head>
<body>
    <header>
        <h2>
            5 Most Popular
        </h2>
        <section class="header-titlecard">
            <h1>POKEMONS</h1>
            <img src="https://www.pngkey.com/png/full/22-229235_pokeball-clipart-black-and-white-poke-ball-black.png" alt="pokeball_logo">
        </section>
    </header>
    <main>
        <section class="cards">
            <div class="pokemon-card">
                <img src="https://archives.bulbagarden.net/media/upload/d/d9/0658Greninja.png" alt="Greninja_image">
                <div class="hidden-text">
                    <h3>GRENINJA</h3>
                    <h4>Ninja Pokemon</h4>
                </div>
            </div>
            <div class="pokemon-card">
                <img src="https://archives.bulbagarden.net/media/upload/thumb/4/42/0448Lucario.png/800px-0448Lucario.png" alt="Lucario_image">
                <div class="hidden-text">
                    <h3>LUCARIO</h3>
                    <h4>Aura Pokemon</h4>
                </div>
            </div>
            <div class="pokemon-card">
                <img src="https://archives.bulbagarden.net/media/upload/thumb/4/41/0778Mimikyu.png/600px-0778Mimikyu.png" alt="Mimikyu_image"> 
                <div class="hidden-text">
                    <h3>MIMIKYU</h3>
                    <h4>Disguise Pokemon</h4>
                </div>
            </div>
            <div class="pokemon-card">
                <img src="https://archives.bulbagarden.net/media/upload/thumb/3/38/0006Charizard.png/600px-0006Charizard.png" alt="Charizard_image">
                <div class="hidden-text">
                    <h3>CHARIZARD</h3>
                    <h4>Flame Pokemon</h4>
                </div>
            </div>
            <div class="pokemon-card">
                <img src="https://archives.bulbagarden.net/media/upload/thumb/e/e1/0197Umbreon.png/600px-0197Umbreon.png" alt="Umbreon_image">
                <div class="hidden-text">
                    <h3>UMBREON</h3>
                    <h4>Moonlight Pokemon</h4>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026</p>
    </footer>
</body>
</html>
